<nav id="navbar" style="position: fixed; top: 0; left: 0; right: 0; z-index: 50; padding: 0 5vw; pointer-events: none;">

  <!-- Background glass layer -->
  <div aria-hidden="true" style="position: absolute; inset: 0; background: rgba(255,255,255,0.03); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px); mask-image: radial-gradient(circle at top, black, transparent 70%); -webkit-mask-image: radial-gradient(circle at top, black, transparent 70%);"></div>

  <!-- Content wrapper -->
  <div style="position: relative; z-index: 10; width: 100%; display: flex; align-items: center; justify-content: space-between; pointer-events: auto; padding-top: 1.5rem; padding-bottom: 1rem;">

    <!-- Logo -->
    <a href="#hero" style="font-family: 'Mona Sans', sans-serif; font-weight: 900; font-size: 0.875rem; letter-spacing: 0.15em; text-transform: uppercase; color: #f0ede6; text-decoration: none; transition: color 0.2s;">
      SL<span style="color: #c8f135;">.</span>
    </a>

    <!-- Desktop links -->
    <div id="desktop-links" style="display: flex; align-items: center; gap: 2.5rem;">
      <a href="#about" style="font-family: 'Inter', sans-serif; font-size: 0.75rem; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(255,255,255,0.4); text-decoration: none; transition: color 0.2s;">About</a>
      <a href="#skills" style="font-family: 'Inter', sans-serif; font-size: 0.75rem; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(255,255,255,0.4); text-decoration: none; transition: color 0.2s;">Skills</a>
      <a href="#projects" style="font-family: 'Inter', sans-serif; font-size: 0.75rem; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(255,255,255,0.4); text-decoration: none; transition: color 0.2s;">Projects</a>
      <a href="#contact" style="font-family: 'Inter', sans-serif; font-size: 0.75rem; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(255,255,255,0.4); text-decoration: none; transition: color 0.2s;">Contact</a>
      <a href="#contact" style="font-family: 'Mona Sans', sans-serif; font-weight: 900; font-size: 0.75rem; letter-spacing: 0.15em; text-transform: uppercase; background: #c8f135; color: #000; padding: 0.5rem 1rem; text-decoration: none; transition: opacity 0.2s;">
        Let's talk
      </a>
    </div>

    <!-- Mobile toggle -->
    <button id="mobile-toggle" style="display: none; background: none; border: none; color: rgba(255,255,255,0.5); cursor: pointer; padding: 0.5rem; transition: color 0.2s;">
      <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.5">
        <line x1="4" y1="8" x2="20" y2="8"/>
        <line x1="4" y1="16" x2="20" y2="16"/>
      </svg>
    </button>

  </div>

</nav>

<!-- Mobile menu -->
<div id="mobile-menu" style="display: none; position: fixed; inset: 0; z-index: 40; background: #000; flex-direction: column; align-items: flex-start; justify-content: flex-end; padding: 6rem 1.5rem 4rem;">
  <a href="#about" onclick="closeMobileMenu()" style="display: block; font-family: 'Mona Sans', sans-serif; font-size: 2.5rem; font-weight: 900; letter-spacing: -0.03em; color: rgba(255,255,255,0.2); text-decoration: none; padding: 0.5rem 0; transition: color 0.2s;">About</a>
  <a href="#skills" onclick="closeMobileMenu()" style="display: block; font-family: 'Mona Sans', sans-serif; font-size: 2.5rem; font-weight: 900; letter-spacing: -0.03em; color: rgba(255,255,255,0.2); text-decoration: none; padding: 0.5rem 0; transition: color 0.2s;">Skills</a>
  <a href="#projects" onclick="closeMobileMenu()" style="display: block; font-family: 'Mona Sans', sans-serif; font-size: 2.5rem; font-weight: 900; letter-spacing: -0.03em; color: rgba(255,255,255,0.2); text-decoration: none; padding: 0.5rem 0; transition: color 0.2s;">Projects</a>
  <a href="#contact" onclick="closeMobileMenu()" style="display: block; font-family: 'Mona Sans', sans-serif; font-size: 2.5rem; font-weight: 900; letter-spacing: -0.03em; color: rgba(255,255,255,0.2); text-decoration: none; padding: 0.5rem 0; transition: color 0.2s;">Contact</a>
</div>

<script>
  // Responsive nav
  function handleResize() {
    const desktopLinks = document.getElementById('desktop-links');
    const mobileToggle = document.getElementById('mobile-toggle');
    if (window.innerWidth >= 768) {
      desktopLinks.style.display = 'flex';
      mobileToggle.style.display = 'none';
      document.getElementById('mobile-menu').style.display = 'none';
    } else {
      desktopLinks.style.display = 'none';
      mobileToggle.style.display = 'block';
    }
  }
  handleResize();
  window.addEventListener('resize', handleResize);

  // Mobile menu toggle
  const toggle = document.getElementById('mobile-toggle');
  const menu = document.getElementById('mobile-menu');
  toggle.addEventListener('click', () => {
    menu.style.display = (menu.style.display === 'flex') ? 'none' : 'flex';
  });

  // Close mobile menu on link click
  function closeMobileMenu() {
    document.getElementById('mobile-menu').style.display = 'none';
  }
</script>
